services:
  db:
    image: postgres:16-alpine
    container_name: chamados-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-chamados}
      POSTGRES_USER: ${DB_USER:-chamados}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chamados}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - chamados_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chamados} -d ${DB_NAME:-chamados}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chamados-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-chamados}
      DB_USER: ${DB_USER:-chamados}
      DB_PASSWORD: ${DB_PASSWORD:-chamados}
      APP_PORT: 8080
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  chamados_postgres_data:

