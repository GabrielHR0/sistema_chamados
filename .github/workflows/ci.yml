name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run unit tests
        run: mvn -B -U clean test

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests   # opcional: remove se quiser rodar em paralelo
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand(\"ping\")' >/dev/null 2>&1 || exit 1"
          --health-interval=10s --health-timeout=5s --health-retries=5
        env:
          MONGO_INITDB_DATABASE: proinsight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Wait for Mongo service to be healthy
        run: |
          # espera até 60s pela saúde do container
          for i in {1..30}; do
            health=$(docker inspect --format='{{.State.Health.Status}}' $(docker ps -q --filter ancestor=mongo:6.0) 2>/dev/null || echo "unknown")
            if [[ "$health" == "healthy" ]]; then
              echo "mongo healthy"
              exit 0
            fi
            echo "waiting for mongo..."
            sleep 2
          done
          echo "mongo not healthy within timeout" && exit 1
        shell: bash

      - name: Run integration tests (skipping unit tests)
        env:
          # se seus testes usam variáveis env, defina aqui; caso seu app leia mongo.uri de properties, ajuste se necessário
          MONGO_URI: mongodb://localhost:27017/proinsight
        run: mvn -B -U -DskipTests=true clean verify

      - name: Upload artifact (build jar)
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: proinsight-jar
          path: target/*.jar
